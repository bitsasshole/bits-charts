<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit's Charts | 404</title>
    <link rel="icon" type="image/png" href="zkp/img/logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background-color: #0a0a0f;
            text-align: center;
            position: relative;
        }

        /* Puntos de fondo */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.08) 1.5px, transparent 1.5px);
            background-size: 2rem 2rem;
            pointer-events: none;
            z-index: 1;
        }

        .err-sprite {
            position: fixed;
            bottom: 0;
            opacity: 0.01;
            right: 0;
            height: 80%;
            width: auto;
            pointer-events: none;
            image-rendering: pixelated;
            z-index: 2;
        }

        .err-content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .err-code {
            font-size: clamp(6rem, 20vw, 12rem);
            color: #000;
            line-height: 1;
            animation: glitch 3s infinite;
        }

        .err-title {
            font-size: clamp(1rem, 3vw, 1.6rem);
            color: #000;
            letter-spacing: 3px;
            margin-top: 0.5rem;
        }

        .err-sub {
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            color: #000;
            letter-spacing: 2px;
            margin-top: 0.4rem;
        }

        .err-btns {
            display: flex;
            gap: 0.8rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .err-btn {
            font-family: monospace;
            font-size: 0.85rem;
            padding: 0.6rem 1.4rem;
            text-decoration: none;
            border: 3px solid #000;
            box-shadow: 4px 4px 0 #000;
            transition: transform 0.1s, box-shadow 0.1s;
            letter-spacing: 1px;
        }
        .err-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #000; }
        .err-btn.primary { background: #ff57b8; color: #000; }
        .err-btn.secondary { background: #23232e; color: #4af1f2; border-color: #4af1f2; box-shadow: 4px 4px 0 #4af1f2; }
        .err-btn.secondary:hover { box-shadow: 6px 6px 0 #4af1f2; }

        @keyframes glitch { 0%,100%{opacity:1;} }
    </style>
    <script>
    window.addEventListener('load', function(){
        document.querySelectorAll('.err-code, .err-title').forEach(function(el) {
            var isCode = el.classList.contains('err-code');
            var canvas = document.createElement('canvas');
            var ctx = canvas.getContext('2d');
            canvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:10;';
            el.style.position = 'relative';
            el.appendChild(canvas);

            function resize() { canvas.width = el.offsetWidth; canvas.height = el.offsetHeight; }
            resize();

            function glitch() {
                var frames = isCode ? 2 + Math.floor(Math.random()*2) : 3 + Math.floor(Math.random()*5);
                var n = 0;
                function tick() {
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    if(n >= frames) {
                        setTimeout(glitch, isCode ? 2500+Math.random()*5000 : 500+Math.random()*3000);
                        return;
                    }
                    var slices  = isCode ? 3+Math.floor(Math.random()*3) : 5+Math.floor(Math.random()*7);
                    var sliceH  = canvas.height / slices;
                    var prob    = isCode ? 0.08 : 0.5;   // ← 404 poco, título más
                    var maxDx   = isCode ? 3 : 24;       // ← 404 poco desplazamiento
                    ctx.fillStyle = getComputedStyle(el).color;
                    for(var i=0;i<slices;i++){
                        if(Math.random()<prob){
                            var sy  = i*sliceH;
                            var dx  = (Math.random()-0.5)*maxDx;
                            var scx = isCode ? 0.97+Math.random()*0.06 : 0.85+Math.random()*0.3;
                            ctx.save();
                            ctx.beginPath(); ctx.rect(0,sy,canvas.width,sliceH+1); ctx.clip();
                            ctx.scale(scx,1); ctx.translate(dx/scx,0);
                            ctx.font = getComputedStyle(el).font;
                            ctx.textAlign='center'; ctx.textBaseline='top';
                            ctx.fillText(el.childNodes[0].textContent, canvas.width/2/scx, 0);
                            ctx.restore();
                        }
                    }
                    n++; setTimeout(tick, 20+Math.random()*30);
                }
                tick();
            }
            setTimeout(glitch, Math.random()*1000);
        });
    });
    </script>
</head>
<body>
    <img src="error404.png" alt="" class="err-sprite">
    <div class="err-content">
        <div class="err-code">404</div>
        <div class="err-title">PAGE NOT FOUND</div>
        <div class="err-sub">This page doesn't exist... yet.</div>
        <div class="err-btns">
            <a href="index.html" class="err-btn primary">> Go Home</a>
            <a href="zkp/mods.html" class="err-btn secondary">> View Mods</a>
        </div>
    </div>
</body>
</html>
