<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit's Charts | 404</title>
    <link rel="icon" type="image/png" href="zkp/img/logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background-color: #0a0a0f;
            text-align: center;
            position: relative;
        }

        /* Puntos de fondo */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.08) 1.5px, transparent 1.5px);
            background-size: 2rem 2rem;
            pointer-events: none;
            z-index: 1;
        }

        .err-sprite {
            position: fixed;
            bottom: 0;
            opacity: 0.01;
            right: 0;
            height: 80%;
            width: auto;
            pointer-events: none;
            image-rendering: pixelated;
            z-index: 2;
        }

        .err-content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .err-code {
            font-size: clamp(6rem, 20vw, 12rem);
            color: #000;
            line-height: 1;
        }

        .err-title {
            font-size: clamp(1rem, 3vw, 1.6rem);
            color: #000;
            letter-spacing: 3px;
            margin-top: 0.5rem;
        }

        .err-sub {
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            color: #000;
            letter-spacing: 2px;
            margin-top: 0.4rem;
        }

        .err-btns {
            display: flex;
            gap: 0.8rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .err-btn {
            font-family: monospace;
            font-size: 0.85rem;
            padding: 0.6rem 1.4rem;
            text-decoration: none;
            border: 3px solid #000;
            box-shadow: 4px 4px 0 #000;
            transition: transform 0.1s, box-shadow 0.1s;
            letter-spacing: 1px;
        }
        .err-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #000; }
        .err-btn.primary { background: #ff57b8; color: #000; }
        .err-btn.secondary { background: #23232e; color: #4af1f2; border-color: #4af1f2; box-shadow: 4px 4px 0 #4af1f2; }
        .err-btn.secondary:hover { box-shadow: 6px 6px 0 #4af1f2; }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            91% { transform: translate(-4px, 2px); }
            92% { transform: translate(4px, -2px); }
            93% { transform: translate(0); }
            95% { transform: translate(-2px, 0); }
            96% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <img src="error404.png" alt="" class="err-sprite">
    <div class="err-content">
        <div class="err-code">404</div>
        <div class="err-title">PAGE NOT FOUND</div>
        <div class="err-sub">This page doesn't exist... yet.</div>
        <div class="err-btns">
            <a href="index.html" class="err-btn primary">> Go Home</a>
            <a href="zkp/mods.html" class="err-btn secondary">> View Mods</a>
        </div>
    </div>
    <script>
    (function(){
        var els = [document.querySelector('.err-code'), document.querySelector('.err-title')];
        function triggerGlitch(el) {
            if(!el) return;
            var duration = 80 + Math.random() * 150;
            var steps = 3 + Math.floor(Math.random() * 4);
            var i = 0;
            var orig = el.style.transform;
            function step() {
                if(i >= steps) {
                    el.style.transform = '';
                    el.style.filter = '';
                    // esperar un tiempo random antes del siguiente glitch
                    setTimeout(function(){ triggerGlitch(el); }, 1500 + Math.random() * 5000);
                    return;
                }
                var tx = (Math.random() - 0.5) * 10;
                var ty = (Math.random() - 0.5) * 4;
                el.style.transform = 'translate('+tx+'px,'+ty+'px)';
                el.style.filter = Math.random() > 0.5 ? 'invert(1)' : 'contrast(2)';
                i++;
                setTimeout(step, duration / steps);
            }
            step();
        }
        // Iniciar con delays distintos para cada elemento
        setTimeout(function(){ triggerGlitch(els[0]); }, 500);
        setTimeout(function(){ triggerGlitch(els[1]); }, 2000);
    })();
    </script>
</html>
