<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit's Charts | All Mods</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .tabs-bar { display: flex; gap: 0; margin-bottom: 1rem; border-bottom: 3px solid var(--border); }
        .tab-btn {
            font-family: 'VCR', monospace; font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 2px; padding: 0.4rem 1.2rem; background: var(--surface2);
            color: var(--text-body); border: 3px solid var(--border); border-bottom: none;
            cursor: pointer; transition: background 0.15s, color 0.15s;
            margin-right: 3px; position: relative; top: 3px;
        }
        .tab-btn:hover { background: var(--surface3); color: var(--white); }
        .tab-btn.active { background: var(--primary); color: var(--white); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .mods-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.6rem; }
        .mods-grid .card-featured { grid-column: span 2; grid-row: span 2; }
        .mods-grid .card-featured .image-placeholder { aspect-ratio: 16/9; font-size: 0.9rem; }
        .mods-grid .card-featured .card-info h3 { font-size: 0.9rem; }
        .mods-grid .card-featured .card-info p { display: block; font-size: 0.7rem; color: rgba(200,200,216,0.6); line-height: 1.4; }
    </style>
</head>
<body class="scrollable">
    <nav class="navbar">
        <div class="nav-logo">
            <a href="../index.html"><img src="img/logo.png" alt="Logo" class="logo-img"></a>
            <a href="../index.html" class="logo-text">Bit's Charts</a>
        </div>
        <ul class="nav-links">
            <li><a href="mods.html" class="active">Mods</a></li>
            <li><a href="install.html">Install</a></li>
            <li><a href="credits.html">Credits</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>All Mods & Charts</h1>
            <p class="subtitle">The full list of my creations.</p>
        </div>
        
        <!-- TABS Y PANELS SE GENERAN AUTOMÁTICAMENTE -->
        <div class="tabs-bar" id="tabs-bar"></div>
        <div id="tab-panels"></div>
    </div>

    <div class="commissions-popup" id="commPopup">
        <div class="popup-drag-handle" id="popupHandle">&#9733; COMMISSIONS &#9733;</div>
        <button class="popup-close" onclick="document.getElementById('commPopup').style.display='none'" title="Close">&#x2715;</button>
        <h4>Commissions Open!</h4>
        <p>I make charts and code for Friday Night Funkin'. Need help with your mod?</p>
        <a href="https://linktr.ee/qm_Bit" class="commission-btn" target="_blank">> Hit me up on Discord!</a>
    </div>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="https://www.youtube.com/@mq-bit" class="footer-link" target="_blank">> YouTube</a>
            <a href="https://x.com/0CloverSp" class="footer-link" target="_blank">> X (Twitter)</a>
        </div>
        <p>&copy; 2026 Bit's Charts. All rights reserved.</p>
    </footer>

    <script src="mods-data.js"></script>
    <script>
        const DIFF_LABELS  = { easy:"EASY", normal:"NORMAL", hard:"HARD", erect:"ERECT" };
        const DIFF_CLASSES = { easy:"diff-easy", normal:"diff-normal", hard:"diff-hard", erect:"diff-erect" };

        function badge(d) {
            return `<span class="diff-badge ${DIFF_CLASSES[d]}">${DIFF_LABELS[d]}</span>`;
        }

        function cardHTML(m, featured) {
            const badges = m.diffs.map(badge).join(' ');
            const obsoleteCls = m.obsolete ? 'obsolete' : '';
            const diffBadge = m.obsolete
                ? `<span class="diff-badge diff-obsolete">OBSOLETE</span>`
                : badges;

            if (featured) {
                return `
                <div class="card card-featured" onclick="location.href='mods/${m.id}.html'">
                    <div class="image-placeholder lazy-bg" data-bg="${m.banner}"></div>
                    <div class="card-info">
                        <h3>${m.name}</h3>
                        <p>${m.diffs.map(d => badge(d)).join(' ')}</p>
                    </div>
                </div>`;
            }
            return `
            <div class="card card-small" onclick="location.href='mods/${m.id}.html'">
                <div class="image-placeholder lazy-bg" data-bg="${m.banner}"></div>
                <div class="card-info"><h4 class="${obsoleteCls}">${m.name} </h4>${diffBadge}</div>
            </div>`;
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // ====================== PÁGINAS AUTOMÁTICAS ======================
        const MODS_PER_PAGE = 12;
        const numPages = Math.ceil(MODS_DATA.length / MODS_PER_PAGE);

        const tabsBar = document.getElementById('tabs-bar');
        const tabPanelsContainer = document.getElementById('tab-panels');

        // Crear tabs y panels dinámicamente
        for (let i = 1; i <= numPages; i++) {
            // Botón de tab
            const btn = document.createElement('button');
            btn.className = `tab-btn ${i === 1 ? 'active' : ''}`;
            btn.textContent = `Page ${i}`;
            btn.onclick = () => switchTab(`tab${i}`, btn);
            tabsBar.appendChild(btn);

            // Panel
            const panel = document.createElement('div');
            panel.className = `tab-panel ${i === 1 ? 'active' : ''}`;
            panel.id = `tab${i}`;

            const grid = document.createElement('div');
            grid.className = 'mods-grid';
            grid.id = `grid-page${i}`;
            panel.appendChild(grid);

            tabPanelsContainer.appendChild(panel);
        }

        // Llenar cada grid (primera carta featured en cada página)
        for (let i = 1; i <= numPages; i++) {
            const start = (i - 1) * MODS_PER_PAGE;
            const end = Math.min(start + MODS_PER_PAGE, MODS_DATA.length);
            const pageMods = MODS_DATA.slice(start, end);

            const grid = document.getElementById(`grid-page${i}`);
            let html = '';

            if (pageMods.length > 0) {
                html += cardHTML(pageMods[0], true);
                for (let j = 1; j < pageMods.length; j++) {
                    html += cardHTML(pageMods[j], false);
                }
            }

            grid.innerHTML = html;
        }
        // ====================== FIN PÁGINAS AUTOMÁTICAS ======================
    </script>

    <script>
    (function() {
        var popup = document.getElementById('commPopup'), handle = document.getElementById('popupHandle');
        if (!popup || !handle) return;
        var drag = false, ox = 0, oy = 0;
        handle.addEventListener('mousedown', function(e) {
            var r = popup.getBoundingClientRect();
            popup.style.transform = 'none';
            popup.style.top = r.top+'px'; popup.style.left = r.left+'px';
            popup.style.right = 'auto'; popup.style.bottom = 'auto';
            drag = true; ox = e.clientX-r.left; oy = e.clientY-r.top; e.preventDefault();
        });
        document.addEventListener('mousemove', function(e) { if(drag){ popup.style.left=(e.clientX-ox)+'px'; popup.style.top=(e.clientY-oy)+'px'; } });
        document.addEventListener('mouseup', function() { drag = false; });
    })();
    </script>

    <script>
    // Lazy loading para background-image
    const lazyObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) {
                var el = entry.target;
                el.style.backgroundImage = "url('" + el.dataset.bg + "')";
                el.style.backgroundSize = 'cover';
                el.style.backgroundPosition = 'center';
                el.classList.remove('lazy-bg');
                lazyObserver.unobserve(el);
            }
        });
    }, { rootMargin: '100px' });
    document.querySelectorAll('.lazy-bg').forEach(function(el) {
        lazyObserver.observe(el);
    });
    </script>
</body>
</html>
