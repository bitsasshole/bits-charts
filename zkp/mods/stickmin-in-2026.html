<script>
(function() {
    var popup = document.getElementById('commPopup');
    var handle = document.getElementById('popupHandle');
    if (!popup || !handle) return;
    var drag = false, ox = 0, oy = 0;
    handle.addEventListener('mousedown', function(e) {
        var r = popup.getBoundingClientRect();
        popup.style.transform = 'none';
        popup.style.top = r.top + 'px'; popup.style.left = r.left + 'px';
        popup.style.right = 'auto'; popup.style.bottom = 'auto';
        drag = true; ox = e.clientX - r.left; oy = e.clientY - r.top;
        e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
        if (drag) { popup.style.left=(e.clientX-ox)+'px'; popup.style.top=(e.clientY-oy)+'px'; }
    });
    document.addEventListener('mouseup', function() { drag = false; });
})();
</script>
